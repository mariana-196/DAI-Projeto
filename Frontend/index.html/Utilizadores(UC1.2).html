<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Utilizadores (TUB)</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f7f6; color: #333; }
        
        .header { 
            background: linear-gradient(135deg, #0D47A1 0%, #002171 100%); 
            color: white; padding: 15px 25px; font-size: 20px; font-weight: 600; 
            display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .header-left { display: flex; align-items: center; }
        .header img { height: 40px; margin-right: 20px; }
        .btn-voltar { background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .btn-voltar:hover { background: rgba(255,255,255,0.3); }

        .container { display: flex; padding: 25px; gap: 25px; max-width: 1400px; margin: 0 auto; }
        
        .card { background: white; border-radius: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); padding: 25px; }
        h3 { margin-top: 0; color: #0D47A1; font-size: 18px; border-bottom: 2px solid #f0f2f5; padding-bottom: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .lista-section { flex: 2; }
        .form-section { flex: 1; background-color: #f8fafc; border: 1px solid #e2e8f0; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { text-align: left; padding: 12px 15px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #555; font-weight: 600; }
        tr:hover { background-color: #f4f7f6; }
        
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-admin { background: #fee2e2; color: #dc2626; }
        .badge-op { background: #e0f2fe; color: #0284c7; }
        .badge-ativo { background: #dcfce7; color: #166534; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; color: #555; font-weight: 600; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; color: white; margin-bottom: 10px; }
        .btn-save { background-color: #2E7D32; }
        .btn-save:hover { background-color: #1B5E20; }
        .btn-cancel { background-color: #94a3b8; }
        .btn-cancel:hover { background-color: #64748b; }
        .btn-permissions { background-color: #0D47A1; }

        .alert-box { padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 13px; display: none; }
        .alert-error { background-color: #fee2e2; color: #dc2626; border-left: 4px solid #dc2626; }
        .alert-success { background-color: #dcfce7; color: #166534; border-left: 4px solid #166534; }
        
        /* Botões de Ação na Tabela */
        .btn-tbl { border: none; background: none; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-edit { color: #0D47A1; margin-right: 10px; }
        .btn-edit:hover { color: #002171; }
        .btn-delete { color: #dc2626; }
        .btn-delete:hover { color: #991b1b; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <img src="tubwhite.png" alt="Logótipo TUB">
            Gestão de Utilizadores e Perfis (UC1.2)
        </div>
        <a href="Dashboard(UC5).html" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i> Voltar ao Dashboard</a>
    </div>

    <div class="container">
        
        <div class="card lista-section">
            <h3><i class="fa-solid fa-users"></i> Contas Registadas</h3>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Perfil</th>
                        <th>Estado</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo">
                    <tr><td colspan="5">A carregar dados do servidor...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card form-section">
            <h3><i class="fa-solid fa-user-gear"></i> Criar / Editar Conta</h3>
            
            <div class="alert-box alert-error" id="aviso-erro"></div>
            <div class="alert-box alert-success" id="aviso-sucesso">
                <strong><i class="fa-solid fa-check"></i> Sucesso:</strong> Operação concluída e registada na Auditoria.
            </div>

            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="input-nome" placeholder="Nome do funcionário">
            </div>
            <div class="form-group">
                <label>Email Profissional</label>
                <input type="email" id="input-email" placeholder="email@tub.pt">
            </div>
            <div class="form-group">
                <label>Palavra-passe</label>
                <input type="password" id="input-password" placeholder="Definir password">
            </div>
            
            <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">

            <div class="form-group">
                <label>Atribuir Perfil (Papel)</label>
                <select id="input-perfil">
                    <option value="" disabled selected>Selecionar Perfil...</option>
                    <option value="OP">Operador TUB</option>
                    <option value="ADMIN">Administrador</option>
                </select>
            </div>

            <button class="btn-action btn-save" onclick="guardarConta()"><i class="fa-solid fa-floppy-disk"></i> Guardar Alterações</button>
            <button class="btn-action btn-cancel" onclick="cancelarOperacao()"><i class="fa-solid fa-xmark"></i> Cancelar Operação [A1]</button>
            <button class="btn-action btn-permissions" onclick="simularErroDB()"><i class="fa-solid fa-database"></i> Erro de Gravação [UC1.2.2]</button>
        </div>

    </div>

    <script>
        // 1. Carregar tabela via API Java
        async function carregarTabela() {
            const corpoTabela = document.getElementById('tabela-corpo');
            try {
                const resposta = await fetch('http://localhost:8081/api/utilizadores');
                if(!resposta.ok) throw new Error("Erro na resposta do servidor");
                
                const utilizadores = await resposta.json();
                corpoTabela.innerHTML = ''; 

                utilizadores.forEach(user => {
                    const classeBadge = user.cargo === 'ADMIN' ? 'badge-admin' : 'badge-op';
                    const textoCargo = user.cargo === 'ADMIN' ? 'Administrador' : 'Operador TUB';

                    corpoTabela.innerHTML += `
                        <tr>
                            <td>${user.nome}</td>
                            <td>${user.email}</td>
                            <td><span class="badge ${classeBadge}">${textoCargo}</span></td>
                            <td><span class="badge badge-ativo">Ativo</span></td>
                            <td>
                                <button class="btn-tbl btn-edit" title="Editar" 
                                        onclick="preencherFormulario('${user.nome}', '${user.email}', '${user.cargo}')">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button class="btn-tbl btn-delete" title="Eliminar" 
                                        onclick="eliminarUtilizador('${user.email}')">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </td>
                        </tr>`;
                });
            } catch (erro) {
                // Fallback de demonstração (Caso o Java esteja offline na apresentação)
                corpoTabela.innerHTML = `
                    <tr>
                        <td>Carlos Silva</td>
                        <td>admin@tub.pt</td>
                        <td><span class="badge badge-admin">Administrador</span></td>
                        <td><span class="badge badge-ativo">Ativo</span></td>
                        <td>
                            <button class="btn-tbl btn-edit" onclick="preencherFormulario('Carlos Silva', 'admin@tub.pt', 'ADMIN')"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="btn-tbl btn-delete" onclick="eliminarUtilizador('admin@tub.pt')"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td>Ana Pereira</td>
                        <td>operador1@tub.pt</td>
                        <td><span class="badge badge-op">Operador TUB</span></td>
                        <td><span class="badge badge-ativo">Ativo</span></td>
                        <td>
                            <button class="btn-tbl btn-edit" onclick="preencherFormulario('Ana Pereira', 'operador1@tub.pt', 'OP')"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="btn-tbl btn-delete" onclick="eliminarUtilizador('operador1@tub.pt')"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    </tr>`;
                console.warn("Backend offline. A mostrar dados de demonstração.");
            }
        }

        // Função para preencher o formulário (UC 1.2.1 - Passo 2)
        function preencherFormulario(nome, email, cargo) {
            document.getElementById('aviso-erro').style.display = 'none';
            document.getElementById('aviso-sucesso').style.display = 'none';

            document.getElementById('input-nome').value = nome;
            document.getElementById('input-email').value = email;
            document.getElementById('input-perfil').value = cargo;
            document.getElementById('input-password').value = ''; // Password limpa por segurança
            
            document.getElementById('input-nome').focus();
        }

        // Função para eliminar utilizador (Novo TC13)
        async function eliminarUtilizador(email) {
            if (confirm(`Ação Crítica: Deseja eliminar permanentemente o utilizador ${email}?`)) {
                try {
                    const resposta = await fetch(`http://localhost:8081/api/utilizadores/eliminar/${email}`, {
                        method: 'DELETE'
                    });

                    if (resposta.ok) {
                        alert("Utilizador removido e evento registado na auditoria.");
                        carregarTabela();
                    } else {
                        throw new Error();
                    }
                } catch (e) {
                    alert("Simulação: Utilizador removido da lista local.");
                    // Remove da tabela visualmente se o Java falhar para não estragar a demo
                    carregarTabela(); 
                }
            }
        }

        // 2. Guardar a conta (Criar ou Atualizar)
        async function guardarConta() {
            const nome = document.getElementById('input-nome').value;
            const email = document.getElementById('input-email').value;
            const password = document.getElementById('input-password').value;
            const perfil = document.getElementById('input-perfil').value;
            
            const avisoErro = document.getElementById('aviso-erro');
            const avisoSucesso = document.getElementById('aviso-sucesso');
            
            avisoErro.style.display = 'none';
            avisoSucesso.style.display = 'none';

            if (!nome || !email || !perfil) {
                avisoErro.innerHTML = '<strong>Erro (Fluxo A2):</strong> Preencha os campos obrigatórios (Nome, Email e Perfil).';
                avisoErro.style.display = 'block';
                return;
            }

            const userObj = { nome, email, password, cargo: perfil };

            try {
                const resposta = await fetch('http://localhost:8081/api/utilizadores/guardar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userObj)
                });

                if (resposta.ok) {
                    avisoSucesso.style.display = 'block';
                    carregarTabela();
                    cancelarOperacao(); // Limpa campos
                } else {
                    throw new Error();
                }
            } catch (erro) {
                avisoErro.innerHTML = '<strong>Erro (Fluxo A1):</strong> Falha na persistência. Verifique se o email já existe.';
                avisoErro.style.display = 'block';
            }
        }

        function cancelarOperacao() {
            document.getElementById('input-nome').value = '';
            document.getElementById('input-email').value = '';
            document.getElementById('input-password').value = '';
            document.getElementById('input-perfil').selectedIndex = 0;
            document.getElementById('aviso-erro').style.display = 'none';
        }

        function simularErroDB() {
            const avisoErro = document.getElementById('aviso-erro');
            document.getElementById('aviso-sucesso').style.display = 'none';
            avisoErro.innerHTML = '<strong>Erro Técnico (Fluxo A1 - UC1.2.2):</strong> Falha de comunicação com MySQL. Alterações não guardadas.';
            avisoErro.style.display = 'block';
        }

        window.onload = carregarTabela;
    </script>
</body>
</html>
