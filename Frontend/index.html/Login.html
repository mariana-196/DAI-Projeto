<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Plataforma de Gestão Urbana (TUB)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0D47A1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); width: 300px; text-align: center; }
        .login-box h2 { color: #0d48a0; margin-bottom: 20px; }
        input[type="email"], input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #ff8000; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; }
        button:hover { background-color: #9c4e00; }
        .error-message { color: #ff0000; font-size: 13px; margin-top: 10px; display: none; text-align: left; }
        
        /* Estilo para o Logótipo */
        .logo-tub {
            height: 60px; /* Ajusta a altura conforme preferires */
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="image_2b1c43.png" alt="Logótipo TUB" class="logo-tub">
        <p style="color: #5d5c5c; font-size: 16px; margin-top: 0;">Bem Vindo à Plataforma TUB! </p>
        
        <input type="email" id="email" placeholder="Email (ex: admin@tub.pt)" required>
        <input type="password" id="password" placeholder="Palavra-passe (ex: 1234)" required>
        
        <div class="error-message" id="error-msg">⚠️ Credenciais inválidas. Tente novamente.</div>
        
        <button onclick="validarLogin()">Entrar</button>
    </div>

    <script>
        function validarLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            // Simulação de validação (Mock de dados para o Protótipo I)
            if (email === 'admin@tub.pt' && password === '1234') {
                // Redireciona para o Dashboard Operacional
                window.location.href = 'index.html'; 
            } else {
                // Fluxo de erro: limpa a password e foca o campo
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }
    </script>

</body>
</html>
