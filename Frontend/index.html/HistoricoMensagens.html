<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Mensagens DMS - TUB</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0D47A1;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --border-light: #e2e8f0;
            --danger: #ef4444;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg-color); color: var(--text-main); }
        
        .header { 
            background: linear-gradient(135deg, var(--primary) 0%, #1e3a8a 100%); 
            color: white; padding: 16px 32px; display: flex; 
            align-items: center; justify-content: space-between; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            position: sticky; top: 0; z-index: 100;
        }
        
        .header-left { display: flex; align-items: center; font-size: 20px; font-weight: 600; }
        .header img { height: 38px; margin-right: 15px; }

        .btn-voltar { 
            background: white; color: var(--primary); border: none; padding: 8px 16px; 
            border-radius: 8px; cursor: pointer; text-decoration: none; font-size: 14px; 
            font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .btn-voltar:hover { transform: translateY(-2px); }

        .container { padding: 30px; max-width: 1200px; margin: 0 auto; }
        
        .card { 
            background: var(--card-bg); border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); 
            padding: 30px; border: 1px solid var(--border-light); 
        }

        h3 { 
            margin-top: 0; color: var(--primary); font-size: 18px; 
            padding-bottom: 16px; border-bottom: 1px solid var(--border-light); 
            margin-bottom: 24px; display: flex; align-items: center; gap: 12px;
        }

        /* Tabela de Histórico */
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { 
            background-color: #f8fafc; color: #64748b; font-weight: 600; 
            text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; 
            padding: 16px; border-bottom: 2px solid var(--border-light); text-align: left; 
        }
        td { padding: 16px; border-bottom: 1px solid var(--border-light); font-size: 14px; }
        tr:hover td { background-color: #f8fafc; }

        .badge-urgente { 
            background: #fef2f2; color: var(--danger); 
            padding: 4px 8px; border-radius: 4px; font-weight: 700; font-size: 11px;
        }
        
        .msg-preview { 
            font-family: 'Courier New', monospace; background: #0f172a; 
            color: #ffb703; padding: 6px 10px; border-radius: 4px; font-size: 12px;
        }

        .filtros { display: flex; gap: 15px; margin-bottom: 20px; }
        .input-filtro { 
            padding: 10px; border: 1px solid var(--border-light); 
            border-radius: 8px; flex: 1; font-family: inherit;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <img src="tubwhite.png" alt="Logótipo TUB" onerror="this.style.display='none'">
            Arquivo de Mensagens DMS
        </div>
        <a href="Dashboard(UC5).html" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
    </div>

    <div class="container">
        <div class="card">
            <h3><i class="fa-solid fa-clock-rotate-left"></i> Histórico de Emissões (UC 6.3)</h3>
            
            <div class="filtros">
                <input type="text" id="filtroMsg" class="input-filtro" placeholder="Pesquisar por conteúdo da mensagem..." onkeyup="filtrarTabela()">
                <button class="btn-voltar" style="background: var(--primary); color: white;" onclick="carregarHistorico()">
                    <i class="fa-solid fa-sync"></i> Atualizar
                </button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Data / Hora</th>
                        <th>Destino</th>
                        <th>Mensagem</th>
                        <th>Tipo</th>
                    </tr>
                </thead>
                <tbody id="tabela-historico">
                    <tr><td colspan="4" style="text-align: center; padding: 30px;">A carregar histórico...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Endpoint do Backend (Linha 99/100)
        const API_URL = 'http://localhost:8080/api/paineis/historico';

        async function carregarHistorico() {
            try {
                const response = await fetch(API_URL);
                const dados = response.ok ? await response.json() : getMockHistorico();
                renderizarTabela(dados);
            } catch (error) {
                renderizarTabela(getMockHistorico());
            }
        }

        function renderizarTabela(lista) {
            const corpo = document.getElementById('tabela-historico');
            corpo.innerHTML = '';

            lista.forEach(item => {
                const data = new Date(item.timestamp).toLocaleString();
                const urgente = item.urgente ? '<span class="badge-urgente">URGENTE</span>' : 'Normal';
                
                corpo.innerHTML += `
                    <tr>
                        <td style="font-weight: 500;">${data}</td>
                        <td style="color: var(--primary); font-weight: 600;">${item.panelId}</td>
                        <td><span class="msg-preview">${item.message}</span></td>
                        <td>${urgente}</td>
                    </tr>
                `;
            });
        }

        function filtrarTabela() {
            const input = document.getElementById('filtroMsg').value.toUpperCase();
            const rows = document.getElementById('tabela-historico').getElementsByTagName('tr');

            for (let i = 0; i < rows.length; i++) {
                const text = rows[i].innerText.toUpperCase();
                rows[i].style.display = text.includes(input) ? "" : "none";
            }
        }

        function getMockHistorico() {
            return [
                { timestamp: new Date(), panelId: 'TODOS', message: 'LINHA 2 COM ATRASO DE 10 MIN', urgente: true },
                { timestamp: new Date(Date.now() - 3600000), panelId: 'PMD-01', message: 'BEM-VINDO AOS TUB', urgente: false },
                { timestamp: new Date(Date.now() - 86400000), panelId: 'PMD-04', message: 'PROXIMO AUTOCARRO EM 5 MIN', urgente: false }
            ];
        }

        window.onload = carregarHistorico;
    </script>
</body>
</html>
