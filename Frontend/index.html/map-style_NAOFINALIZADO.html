<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGU - Dashboard Operacional TUB</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: #f4f7f6; /* Cinza muito clarinho e limpo */
            color: #333; 
        }
        
        /* Cabeçalho com o gradiente do Login */
        .header { 
            background: linear-gradient(135deg, #0D47A1 0%, #002171 100%); 
            color: white; 
            padding: 15px 25px; 
            font-size: 20px; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .header img { height: 40px; margin-right: 20px; }

        /* Layout Principal */
        .container { 
            display: flex; 
            padding: 25px; 
            gap: 25px; 
            height: calc(100vh - 100px); 
            box-sizing: border-box;
        }
        
        /* Estilo base para todos os painéis (Cards) */
        .card { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
        }
        
        .card h3 { 
            margin-top: 0; 
            color: #0D47A1; 
            font-size: 17px; 
            border-bottom: 2px solid #f0f2f5; 
            padding-bottom: 12px; 
            margin-bottom: 15px; 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Área do Mapa (UC 5.1 e UC 4.1) */
        .map-section { flex: 2; }
        #map { 
            flex: 1; 
            border-radius: 8px; 
            border: 1px solid #e2e8f0;
            z-index: 1; /* Mantém o mapa contido na sua área */
        }

        /* Área Lateral: Alertas e Gráficos */
        .sidebar { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
        }

        /* Estilo da Notificação de Alerta */
        .alert { 
            background-color: #fff7ed; 
            border-left: 5px solid #ff8000; /* Laranja TUB */
            padding: 15px; 
            border-radius: 6px; 
            font-size: 14px; 
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .alert i { color: #ff8000; font-size: 20px; margin-top: 2px; }
        .alert-content strong { color: #c2410c; display: block; margin-bottom: 4px; font-size: 15px; }
        .alert-content span { color: #555; }
    </style>
</head>
<body>

    <div class="header">
        <img src="tubwhite.png" alt="Logótipo TUB">
        Plataforma de Gestão Urbana (TUB) - Protótipo I
    </div>

    <div class="container">
        <div class="card map-section">
            <h3><i class="fa-solid fa-map-location-dot"></i> Mapa Geral em Tempo Real (UC5.1)</h3>
            <div id="map"></div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h3><i class="fa-solid fa-bell"></i> Centro de Alertas (UC5.3)</h3>
                <div class="alert">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <div class="alert-content">
                        <strong>Sobrelotação - Linha 2</strong>
                        <span>Autocarro #405 atingiu 95,5% da capacidade máxima.</span>
                    </div>
                </div>
            </div>

            <div class="card" style="flex: 1;">
                <h3><i class="fa-solid fa-chart-column"></i> Bilhética: Procura vs Oferta (UC3)</h3>
                <div style="position: relative; height: 100%; width: 100%;">
                    <canvas id="meuGrafico"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. INICIAR O MAPA DE BRAGA
        var map = L.map('map').setView([41.5503, -8.4200], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Adicionar um marcador (UC4.1) com um ícone padrão do Leaflet
        var autocarro = L.marker([41.5510, -8.4220]).addTo(map)
            .bindPopup('<div style="text-align:center;"><b>🚌 Autocarro #405</b><br><span style="color:red; font-weight:bold;">Lotação: 95,5%</span><br>Estado: Crítico</div>')
            .openPopup();

        // 2. INICIAR O GRÁFICO DE BILHÉTICA
        var ctx = document.getElementById('meuGrafico').getContext('2d');
        var meuGrafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00', '21:00', '22:00'],
                datasets: [{
                    label: 'Validações (Passageiros)',
                    data: [120, 190, 60, 45, 150, 230, 80, 90, 200, 170, 250, 300, 220, 180, 130],
                    backgroundColor: '#0D47A1',
                    borderRadius: 4 /* Barras ligeiramente arredondadas */
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false } /* Remove a legenda repetitiva */
                }
            }
        });
    </script>
</body>
</html>
