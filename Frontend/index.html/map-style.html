<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGU - Dashboard Operacional TUB</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f6f9; color: #333; }
        .header { background-color: #0D47A1; color: white; padding: 15px 20px; font-size: 24px; font-weight: bold; }
        .container { display: flex; padding: 20px; gap: 20px; height: 85vh; }
        
        /* Área do Mapa (UC 5.1 e UC 4.1) */
        .map-section { flex: 2; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); padding: 15px; display: flex; flex-direction: column; }
        #map { flex: 1; border-radius: 5px; margin-top: 10px; }

        /* Área Lateral: Alertas e Gráficos (UC 5.3 e UC 3) */
        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .alert { background-color: #ffebee; border-left: 5px solid #f44336; padding: 10px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        🚌 PGU - Dashboard Operacional (Protótipo I)
    </div>

    <div class="container">
        <div class="map-section">
            <h3>Visão Geral da Frota (UC5.1)</h3>
            <div id="map"></div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h3>Centro de Alertas (UC5.3)</h3>
                <div class="alert">
                    <strong>⚠️ Sobrelotação - Linha 2</strong><br>
                    Autocarro #405 atingiu 95,5% da capacidade.
                </div>
            </div>

            <div class="card">
                <h3>Bilhética: Procura vs Oferta (UC3)</h3>
                <canvas id="meuGrafico"></canvas>
            </div>
        </div>
    </div>

    <script>
        // 1. INICIAR O MAPA DE BRAGA
        // Coordenadas centrais de Braga: 41.5503, -8.4200
        var map = L.map('map').setView([41.5503, -8.4200], 14);

        // Carregar o mapa de ruas do OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Adicionar um marcador a fingir que é um autocarro (UC4.1)
        var autocarro = L.marker([41.5510, -8.4220]).addTo(map)
            .bindPopup('<b>Autocarro #405</b><br>Lotação: 95,5% <br>Estado: Crítico')
            .openPopup();

        // 2. INICIAR O GRÁFICO DE BILHÉTICA
        var ctx = document.getElementById('meuGrafico').getContext('2d');
        var meuGrafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['08:00', '09:00', '10:00', '11:00'],
                datasets: [{
                    label: 'Validações (Passageiros)',
                    data: [120, 190, 60, 45],
                    backgroundColor: '#0D47A1'
                }]
            }
        });
    </script>
</body>
</html>
