<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Plataforma de Gestão Urbana (TUB)</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* Fundo com gradiente moderno */
            background: linear-gradient(135deg, #0D47A1 0%, #002171 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        .login-box { 
            background: #ffffff; 
            padding: 50px 40px; 
            border-radius: 16px; 
            box-shadow: 0 15px 25px rgba(0,0,0,0.3); 
            width: 320px; 
            text-align: center; 
        }

        /* Estilo para o Logótipo */
        .logo-tub {
            height: 65px; 
            margin-bottom: 10px;
        }

        .login-box p {
            color: #666; 
            font-size: 15px; 
            margin-top: 0;
            margin-bottom: 30px;
        }
        
        /* Grupo de Inputs para alinhar o ícone */
        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group input { 
            width: 100%; 
            padding: 14px 12px; 
            border: 1px solid #d1d5db; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        /* Espaço extra para a password não ficar por baixo do olho */
        #password {
            padding-right: 40px;
        }

        .input-group input:focus {
            border-color: #0D47A1;
            box-shadow: 0 0 0 3px rgba(13, 71, 161, 0.1);
            outline: none;
        }

        /* Ícone do Olho */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
            font-size: 16px;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #0D47A1;
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #ff8000; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            margin-top: 10px; 
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover { 
            background-color: #e67300; 
        }

        button:active {
            transform: scale(0.98);
        }

        .error-message { 
            color: #dc2626; 
            font-size: 14px; 
            margin-top: -5px; 
            margin-bottom: 15px;
            display: none; 
            text-align: left;
            background-color: #fee2e2;
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid #dc2626;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="image_2b1c43.png" alt="Logótipo TUB" class="logo-tub">
        <p>Bem Vindo à Plataforma TUB!</p>
        
        <div class="error-message" id="error-msg">⚠️ Credenciais inválidas. Tente novamente.</div>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email (ex: admin@tub.pt)" required>
        </div>
        
        <div class="input-group">
            <input type="password" id="password" placeholder="Palavra-passe (ex: 1234)" required>
            <i class="fa-regular fa-eye toggle-password" id="eye-icon" onclick="toggleVisibility()"></i>
        </div>
        
        <button id="btn-entrar" onclick="validarLogin()">Entrar</button>
    </div>

    <script>
        // Função para mostrar/ocultar a palavra-passe (Igual ao original)
        function toggleVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // --- PONTE JAVA INTEGRADA ---
        async function validarLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-entrar');

            // Feedback visual básico de carregamento
            btn.innerText = "A autenticar...";
            btn.disabled = true;

            try {
                // Chamada real ao teu Backend Java
                const response = await fetch('http://localhost:8081/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                if (response.ok) {
                    // SUCESSO: Redireciona
                    window.location.href = 'index.html'; 
                } else {
                    // FALHA: Executa o fluxo de erro original do colega
                    executarFluxoErroOriginal();
                }
            } catch (error) {
                console.error("Erro ao ligar ao Java:", error);
                // Se o Java estiver offline, mostramos o erro visual original
                executarFluxoErroOriginal();
            } finally {
                btn.innerText = "Entrar";
                btn.disabled = false;
            }
        }

        // Função que preserva exatamente o comportamento de erro que o teu colega escreveu
        function executarFluxoErroOriginal() {
            const errorMsg = document.getElementById('error-msg');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');

            errorMsg.style.display = 'block';
            passwordInput.value = '';
            
            // Garante que a pass volta a ficar oculta (Lógica original)
            passwordInput.type = 'password';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
            
            passwordInput.focus();
        }
    </script>

</body>
</html>
