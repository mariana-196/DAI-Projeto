<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitorização em Tempo Real (TUB)</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0D47A1;
            --primary-hover: #002171;
            --bg-color: #f4f7f6;
            --success: #2E7D32;
            --warning: #f59e0b;
            --danger: #dc2626;
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: var(--bg-color); 
            color: #333; 
        }
        
        /* O teu Cabeçalho com o gradiente e botão voltar */
        .header { 
            background: linear-gradient(135deg, var(--primary) 0%, #1e3a8a 100%); 
            color: white; 
            padding: 16px 32px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-left { display: flex; align-items: center; font-size: 20px; font-weight: 600; }
        .header img { height: 38px; margin-right: 15px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        
        .btn-voltar { 
            background: white; 
            color: var(--primary); 
            border: none; 
            padding: 8px 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 600; 
            transition: all 0.2s; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-voltar:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }

        .container { 
            padding: 25px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        
        .card { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); 
            padding: 25px; 
        }

        h3 { 
            margin-top: 0; 
            color: var(--primary); 
            font-size: 18px; 
            border-bottom: 2px solid #f0f2f5; 
            padding-bottom: 12px; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        /* Grid para mostrar vários autocarros como pediste inicialmente */
        .frota-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); 
            gap: 20px; 
        }
        
        /* O teu design de Bus Item */
        .bus-item { 
            border: 1px solid #e2e8f0; 
            border-radius: 8px; 
            padding: 20px; 
            transition: 0.3s; 
            background: white;
        }

        .bus-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            font-weight: bold; 
            font-size: 16px; 
        }

        .bus-badge { 
            padding: 5px 10px; 
            border-radius: 6px; 
            font-size: 13px; 
            font-weight: bold; 
        }
        
        .progress-container { 
            width: 100%; 
            background-color: #e2e8f0; 
            border-radius: 8px; 
            height: 20px; 
            overflow: hidden; 
            margin-bottom: 10px; 
            position: relative; 
        }

        .progress-bar { 
            height: 100%; 
            transition: width 0.4s ease; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-size: 12px; 
            font-weight: bold; 
        }
        
        .stats { 
            display: flex; 
            justify-content: space-between; 
            font-size: 13px; 
            color: #666; 
        }

        .refresh-section {
            margin-bottom: 20px;
            display: flex;
            justify-content: flex-end;
        }

        .btn-refresh {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <img src="tubwhite.png" alt="Logótipo TUB">
            Monitorização da Lotação em Tempo Real
        </div>
        <a href="Dashboard(UC5).html" class="btn-voltar">
            <i class="fa-solid fa-arrow-left"></i> Voltar ao Dashboard
        </a>
    </div>

    <div class="container">
        <div class="refresh-section">
            <button class="btn-refresh" onclick="carregarFrota()">
                <i class="fa-solid fa-sync"></i> Atualizar Dados
            </button>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-bus"></i> Estado da Frota em Circulação</h3>
            <div id="frota-container" class="frota-grid">
                <p>A carregar dados...</p>
            </div>
        </div>
    </div>

    <script>
        // URL da API que configuraste no Java (porta 8081 conforme os teus testes)
        const API_URL = 'http://localhost:8081/api/monitorizacao/status-geral';

        async function carregarFrota() {
            const container = document.getElementById('frota-container');
            
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error();
                
                const frota = await response.json();
                renderizarFrota(frota);
            } catch (error) {
                console.warn("Backend offline. A mostrar dados de simulação.");
                renderizarFrota(getMockData());
            }
        }

        function renderizarFrota(viaturas) {
            const container = document.getElementById('frota-container');
            container.innerHTML = '';

            viaturas.forEach(v => {
                const percentagem = Math.round((v.passageiros / v.capacidade) * 100);
                let cor = 'var(--success)';
                let badgeText = 'NORMAL';
                let badgeStyle = 'background-color: #e2e8f0; color: #333;';

                if (percentagem >= 90) {
                    cor = 'var(--danger)';
                    badgeText = 'CRÍTICO';
                    badgeStyle = 'background-color: #fee2e2; color: #dc2626;';
                } else if (percentagem >= 70) {
                    cor = 'var(--warning)';
                    badgeText = 'MODERADO';
                    badgeStyle = 'background-color: #fef3c7; color: #d97706;';
                }

                container.innerHTML += `
                    <div class="bus-item">
                        <div class="bus-header">
                            <span><i class="fa-solid fa-wifi" style="color: var(--success); margin-right: 8px;"></i> Autocarro #${v.id} (Linha ${v.linha})</span>
                            <span class="bus-badge" style="${badgeStyle}">${badgeText}</span>
                        </div>
                        
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${percentagem}%; background-color: ${cor};">
                                ${percentagem}%
                            </div>
                        </div>
                        
                        <div class="stats">
                            <span>Ocupação: ${v.passageiros} passageiros</span>
                            <span>Capacidade Máxima: ${v.capacidade}</span>
                        </div>
                    </div>
                `;
            });
        }

        function getMockData() {
            return [
                { id: '405', linha: '2', passageiros: 10, capacidade: 50 },
                { id: '112', linha: '43', passageiros: 46, capacidade: 50 },
                { id: '302', linha: '7', passageiros: 35, capacidade: 50 }
            ];
        }

        // Inicia a carregar os dados
        window.onload = carregarFrota;
        // Atualiza automaticamente a cada 10 segundos
        setInterval(carregarFrota, 10000);
    </script>
</body>
</html>
